# Docker Compose para producción (Coolify)
#
# En Coolify:
#   1. Asignar dominio SOLO al servicio "frontend" (puerto 80)
#   2. NO asignar dominio a "wtxapi", "worker", "redis" ni "postgres"
#   3. El frontend hace proxy interno de /api -> wtxapi:3000
#   Nota: el servicio se llama "wtxapi" (no "api") para evitar colisión de
#   nombre con otros proyectos en la red compartida de Coolify.
#
# Variables requeridas en Coolify:
#   - OPENAI_API_KEY: API key de OpenAI
#   - JWT_SECRET: Secret para JWT (genera con: openssl rand -hex 32)
#   - DB_PASSWORD: Password de PostgreSQL
#   - WHATSAPP_API_URL: URL de WAHA/Evolution API
#   - WHATSAPP_API_KEY: API key de WAHA/Evolution

services:
  wtxdb:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: whatsapp_agent
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: whatsapp_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsapp_agent -d whatsapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  wtxredis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  wtxapi:
    build:
      context: ./whatsapp-ai-api
      dockerfile: Dockerfile.prod
    environment:
      DATABASE_URL: postgresql://whatsapp_agent:${DB_PASSWORD:?DB_PASSWORD required}@wtxdb:5432/whatsapp_db
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY required}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required (openssl rand -hex 32)}
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN:-}
      REDIS_URL: redis://wtxredis:6379/0
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:-}
      WHATSAPP_SESSION: ${WHATSAPP_SESSION:-default}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS required (comma-separated origins, no '*')}
    depends_on:
      wtxdb:
        condition: service_healthy
      wtxredis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  worker:
    build:
      context: ./whatsapp-ai-api
      dockerfile: Dockerfile.prod
    command: python worker.py
    environment:
      DATABASE_URL: postgresql://whatsapp_agent:${DB_PASSWORD:?DB_PASSWORD required}@wtxdb:5432/whatsapp_db
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY required}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required (openssl rand -hex 32)}
      REDIS_URL: redis://wtxredis:6379/0
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:-}
      WHATSAPP_SESSION: ${WHATSAPP_SESSION:-default}
    healthcheck:
      disable: true
    depends_on:
      wtxdb:
        condition: service_healthy
      wtxredis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  frontend:
    build:
      context: ./whatsapp-ai-frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    depends_on:
      - wtxapi
    restart: unless-stopped
    networks:
      - coolify
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  coolify:
    external: true
  internal:
